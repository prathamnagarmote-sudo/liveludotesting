<svg viewBox="0 0 62.5 100" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Soft drop shadow under the base -->
    <radialGradient id="pawnShadow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#000000" stop-opacity="0.8" />
      <stop offset="100%" stop-color="#000000" stop-opacity="0" />
    </radialGradient>

    <!-- Glossy spherical 3D reflection for the head and base -->
    <radialGradient id="sphereShine" cx="30%" cy="30%" r="70%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.85" />
      <stop offset="40%" stop-color="#ffffff" stop-opacity="0.2" />
      <stop offset="80%" stop-color="#000000" stop-opacity="0.1" />
      <stop offset="100%" stop-color="#000000" stop-opacity="0.5" />
    </radialGradient>

    <!-- Body gradient for cylinder depth -->
    <linearGradient id="bodyShade" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.35" />
      <stop offset="25%" stop-color="#ffffff" stop-opacity="0.1" />
      <stop offset="60%" stop-color="#000000" stop-opacity="0.1" />
      <stop offset="100%" stop-color="#000000" stop-opacity="0.55" />
    </linearGradient>

    <!-- Glassy shell finish overlay -->
    <radialGradient id="glassShell" cx="30%" cy="30%" r="75%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.4" />
      <stop offset="60%" stop-color="#ffffff" stop-opacity="0.05" />
      <stop offset="100%" stop-color="#475569" stop-opacity="0.25" />
    </radialGradient>
  </defs>

  <!-- Ground Shadow -->
  <ellipse cx="31.25" cy="88" rx="20" ry="6" fill="url(#pawnShadow)" />

  <!-- Base Plate (3D look) -->
  <ellipse cx="31.25" cy="83" rx="18" ry="6.5" fill="var(--fill-colour)" stroke="rgba(255,255,255,0.4)" stroke-width="0.7" />
  <ellipse cx="31.25" cy="83" rx="18" ry="6.5" fill="url(#sphereShine)" opacity="0.8" />
  <ellipse cx="31.25" cy="83" rx="18" ry="6.5" fill="url(#glassShell)" opacity="0.6" />

  <!-- Sweeping Body Cone (curves inward gracefully like a professional chess/Ludo pawn) -->
  <path d="M 14.5 83 C 16.5 63, 23.5 59, 25.5 51 L 37 51 C 39 59, 46 63, 48 83 Z" fill="var(--fill-colour)" stroke="rgba(255,255,255,0.3)" stroke-width="0.7" />
  <path d="M 14.5 83 C 16.5 63, 23.5 59, 25.5 51 L 37 51 C 39 59, 46 63, 48 83 Z" fill="url(#bodyShade)" opacity="0.85" />
  <path d="M 14.5 83 C 16.5 63, 23.5 59, 25.5 51 L 37 51 C 39 59, 46 63, 48 83 Z" fill="url(#glassShell)" opacity="0.5" />

  <!-- Collar Ring (separating body and head) -->
  <ellipse cx="31.25" cy="51" rx="8" ry="3" fill="var(--fill-colour)" stroke="rgba(255,255,255,0.4)" stroke-width="0.7" />
  <ellipse cx="31.25" cy="51" rx="8" ry="3" fill="url(#sphereShine)" opacity="0.8" />
  <ellipse cx="31.25" cy="51" rx="8" ry="3" fill="url(#glassShell)" opacity="0.6" />

  <!-- Head Sphere (perfectly round, glowing, and high-fidelity) -->
  <circle cx="31.25" cy="33" r="11.5" fill="var(--fill-colour)" stroke="rgba(255,255,255,0.3)" stroke-width="0.7" />
  <circle cx="31.25" cy="33" r="11.5" fill="url(#sphereShine)" opacity="0.95" />
  <circle cx="31.25" cy="33" r="11.5" fill="url(#glassShell)" opacity="0.65" />

  <!-- Glass Specular Crescent Highlights -->
  <ellipse cx="27.5" cy="27" rx="3.5" ry="1.8" fill="#ffffff" opacity="0.75" transform="rotate(-15 27.5 27)" />
  <ellipse cx="34" cy="38" rx="2" ry="1" fill="#ffffff" opacity="0.25" />
</svg>
